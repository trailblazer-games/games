<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout Game</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
        }
        .game-container {
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        canvas {
            border: 3px solid #fff;
            border-radius: 10px;
            background: #000;
            display: block;
            margin: 10px auto;
            max-width: 100%;
            height: auto;
        }
        .controls {
            margin: 20px 0;
        }
        button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s ease;
        }
        button:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }
        .score {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }
        .instructions {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 15px;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🧱 Breakout Game</h1>
        <div class="score">Score: <span id="score">0</span> | Lives: <span id="lives">3</span></div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div class="controls">
            <button id="startBtn">Start Game</button>
            <button id="pauseBtn">Pause</button>
            <button id="restartBtn">Restart</button>
        </div>

        <div class="instructions">
            🖥️ Desktop: Use ← → arrow keys or A/D keys to move paddle<br>
            📱 Mobile: Touch and drag or tilt device to move paddle
        </div>

        <div id="gameOver" class="game-over">
            <h2 id="gameOverTitle">Game Over!</h2>
            <p id="finalScore">Final Score: 0</p>
            <button onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const gameOverDiv = document.getElementById('gameOver');
        const gameOverTitle = document.getElementById('gameOverTitle');
        const finalScoreElement = document.getElementById('finalScore');

        // Game state
        let gameRunning = false;
        let gamePaused = false;
        let score = 0;
        let lives = 3;

        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height - 50,
            radius: 10,
            dx: 5,
            dy: -5,
            speed: 5
        };

        // Paddle
        const paddle = {
            x: canvas.width / 2 - 75,
            y: canvas.height - 20,
            width: 150,
            height: 15,
            speed: 8
        };

        // Bricks
        const brickRows = 8;
        const brickCols = 10;
        const brickWidth = 75;
        const brickHeight = 20;
        const brickPadding = 5;
        const brickOffsetTop = 60;
        const brickOffsetLeft = 35;

        let bricks = [];

        // Colors for different rows
        const brickColors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7', '#dda0dd', '#98d8c8', '#f7dc6f'];

        // Input handling
        const keys = {};
        let touchX = 0;
        let isTouching = false;

        // Initialize bricks
        function initBricks() {
            bricks = [];
            for (let r = 0; r < brickRows; r++) {
                bricks[r] = [];
                for (let c = 0; c < brickCols; c++) {
                    bricks[r][c] = {
                        x: c * (brickWidth + brickPadding) + brickOffsetLeft,
                        y: r * (brickHeight + brickPadding) + brickOffsetTop,
                        status: 1,
                        color: brickColors[r]
                    };
                }
            }
        }

        // Reset game
        function resetGame() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height - 50;
            ball.dx = Math.random() > 0.5 ? 5 : -5;
            ball.dy = -5;
            paddle.x = canvas.width / 2 - paddle.width / 2;
            score = 0;
            lives = 3;
            initBricks();
            updateUI();
            gameOverDiv.style.display = 'none';
        }

        // Update UI
        function updateUI() {
            scoreElement.textContent = score;
            livesElement.textContent = lives;
        }

        // Draw ball
        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.closePath();
        }

        // Draw paddle
        function drawPaddle() {
            const gradient = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.height);
            gradient.addColorStop(0, '#fff');
            gradient.addColorStop(1, '#ccc');
            ctx.fillStyle = gradient;
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
        }

        // Draw bricks
        function drawBricks() {
            for (let r = 0; r < brickRows; r++) {
                for (let c = 0; c < brickCols; c++) {
                    const brick = bricks[r][c];
                    if (brick.status === 1) {
                        ctx.fillStyle = brick.color;
                        ctx.fillRect(brick.x, brick.y, brickWidth, brickHeight);

                        // Add shine effect
                        const gradient = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brickHeight);
                        gradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
                        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                        ctx.fillStyle = gradient;
                        ctx.fillRect(brick.x, brick.y, brickWidth, brickHeight);
                    }
                }
            }
        }

        // Collision detection
        function collisionDetection() {
            for (let r = 0; r < brickRows; r++) {
                for (let c = 0; c < brickCols; c++) {
                    const brick = bricks[r][c];
                    if (brick.status === 1) {
                        if (ball.x > brick.x && ball.x < brick.x + brickWidth &&
                            ball.y > brick.y && ball.y < brick.y + brickHeight) {
                            ball.dy = -ball.dy;
                            brick.status = 0;
                            score += 10;
                            updateUI();

                            // Check if all bricks are destroyed
                            if (score === brickRows * brickCols * 10) {
                                gameRunning = false;
                                gameOverTitle.textContent = 'You Win!';
                                finalScoreElement.textContent = `Final Score: ${score}`;
                                gameOverDiv.style.display = 'block';
                            }
                        }
                    }
                }
            }
        }

        // Update ball position
        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall collision
            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                ball.dx = -ball.dx;
            }
            if (ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }

            // Paddle collision
            if (ball.y + ball.radius > paddle.y && ball.y - ball.radius < paddle.y + paddle.height &&
                ball.x > paddle.x && ball.x < paddle.x + paddle.width) {

                // Calculate hit position on paddle for angle variation
                const hitPos = (ball.x - paddle.x) / paddle.width;
                const angle = (hitPos - 0.5) * Math.PI / 3; // Max 60 degrees

                ball.dx = ball.speed * Math.sin(angle);
                ball.dy = -ball.speed * Math.cos(angle);
            }

            // Bottom wall - lose life
            if (ball.y + ball.radius > canvas.height) {
                lives--;
                updateUI();

                if (lives === 0) {
                    gameRunning = false;
                    gameOverTitle.textContent = 'Game Over!';
                    finalScoreElement.textContent = `Final Score: ${score}`;
                    gameOverDiv.style.display = 'block';
                } else {
                    // Reset ball position
                    ball.x = canvas.width / 2;
                    ball.y = canvas.height - 50;
                    ball.dx = Math.random() > 0.5 ? 5 : -5;
                    ball.dy = -5;
                    paddle.x = canvas.width / 2 - paddle.width / 2;
                }
            }
        }

        // Update paddle position
        function updatePaddle() {
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                paddle.x = Math.max(0, paddle.x - paddle.speed);
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                paddle.x = Math.min(canvas.width - paddle.width, paddle.x + paddle.speed);
            }

            // Touch control
            if (isTouching) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const relativeX = (touchX - rect.left) * scaleX;
                paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, relativeX - paddle.width / 2));
            }
        }

        // Main game loop
        function gameLoop() {
            if (!gameRunning || gamePaused) return;

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update
            updateBall();
            updatePaddle();
            collisionDetection();

            // Draw
            drawBricks();
            drawBall();
            drawPaddle();

            requestAnimationFrame(gameLoop);
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Touch events for mobile
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isTouching = true;
            const touch = e.touches[0];
            touchX = touch.clientX;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isTouching) {
                const touch = e.touches[0];
                touchX = touch.clientX;
            }
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isTouching = false;
        });

        // Mouse events for desktop
        canvas.addEventListener('mousemove', (e) => {
            if (gameRunning && !gamePaused) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const relativeX = (e.clientX - rect.left) * scaleX;
                paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, relativeX - paddle.width / 2));
            }
        });

        // Button event listeners
        document.getElementById('startBtn').addEventListener('click', () => {
            if (!gameRunning) {
                gameRunning = true;
                gamePaused = false;
                gameLoop();
            }
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (gameRunning) {
                gamePaused = !gamePaused;
                if (!gamePaused) {
                    gameLoop();
                }
            }
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            restartGame();
        });

        function restartGame() {
            gameRunning = false;
            gamePaused = false;
            resetGame();
        }

        // Initialize game
        resetGame();

        // Make canvas responsive
        function resizeCanvas() {
            const container = document.querySelector('.game-container');
            const maxWidth = Math.min(800, container.clientWidth - 40);
            const scale = maxWidth / 800;

            canvas.style.width = maxWidth + 'px';
            canvas.style.height = (600 * scale) + 'px';
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
